name: Fedora RPM package

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install build tools
        run: |
          dnf -y install git golang python3 python3-pip python3-devel findutils
          GOBIN=/usr/local/bin go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          nfpm --version

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build RPM
        run: bash ./packaging/build-packages.sh

      - name: Validate package version
        run: |
          bash ./scripts/validate-package-version.sh
          VERSION="$(cat VERSION)"
          PACKAGE_RELEASE="$(cat PACKAGE_RELEASE)"
          test -f "dist/gic-ipsec-client-${VERSION}-${PACKAGE_RELEASE}.x86_64.rpm"
          ! find dist -maxdepth 1 -type f -name '*0.1.0*' | grep -q .

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: gic-ipsec-client-rpm
          path: dist/gic-ipsec-client-*.x86_64.rpm
          if-no-files-found: error

  install-smoke:
    runs-on: ubuntu-latest
    needs: build-rpm
    container:
      image: fedora:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: gic-ipsec-client-rpm
          path: dist

      - name: Validate RPM version metadata
        run: |
          VERSION="$(cat VERSION)"
          PACKAGE_RELEASE="$(cat PACKAGE_RELEASE)"
          rpm_file="$(ls dist/gic-ipsec-client-${VERSION}-${PACKAGE_RELEASE}*.rpm)"
          test -n "$rpm_file"
          test "$(rpm -qp --qf '%{VERSION}' "$rpm_file")" = "$VERSION"
          rpm_release="$(rpm -qp --qf '%{RELEASE}' "$rpm_file")"
          case "$rpm_release" in
            "$PACKAGE_RELEASE"*) ;;
            *) echo "Unexpected RPM release: $rpm_release" >&2; exit 1 ;;
          esac
          ! find dist -maxdepth 1 -type f -name '*0.1.0*' | grep -q .

      - name: Inspect RPM requirements
        run: |
          rpm -qpR dist/gic-ipsec-client-*.rpm | sort | tee rpm-requires.txt
          grep -Fx 'strongswan' rpm-requires.txt
          grep -Fx 'polkit' rpm-requires.txt
          grep -Fx 'libsecret' rpm-requires.txt
          grep -Fx 'iproute' rpm-requires.txt
          grep -Fx 'systemd-resolved' rpm-requires.txt
          ! grep -F '/usr/sbin/swanctl' rpm-requires.txt
          ! grep -F '/usr/bin/swanctl' rpm-requires.txt
          ! grep -F 'swanctl' rpm-requires.txt

      - name: Install RPM in clean Fedora container
        run: dnf -y install ./dist/gic-ipsec-client-*.rpm

      - name: Verify installed commands
        run: |
          VERSION="$(cat VERSION)"
          test "$(gic-ipsec-client --version)" = "gic-ipsec-client ${VERSION}"
          test "$(/usr/libexec/gic-ipsec-client/gic-ipsec-helper --version)" = "gic-ipsec-helper ${VERSION}"
          command -v gic-ipsec-client
          test -x /usr/libexec/gic-ipsec-client/gic-ipsec-helper
          command -v swanctl
          command -v resolvectl
          command -v pkexec
          command -v ip
          rpm -q strongswan polkit libsecret iproute systemd-resolved
