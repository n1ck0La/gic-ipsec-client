name: Fedora RPM package

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install build tools
        run: |
          dnf -y install git golang python3 python3-pip python3-devel findutils
          GOBIN=/usr/local/bin go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          nfpm --version

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build RPM
        run: bash ./packaging/build-packages.sh

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: gic-ipsec-client-rpm
          path: dist/gic-ipsec-client-*-1.x86_64.rpm
          if-no-files-found: error

  install-smoke:
    runs-on: ubuntu-latest
    needs: build-rpm
    container:
      image: fedora:latest

    steps:
      - name: Install validation tools
        run: dnf -y install dnf-plugins-core which

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: gic-ipsec-client-rpm
          path: dist

      - name: Validate swanctl provider
        run: dnf repoquery --whatprovides '*/swanctl'

      - name: Inspect RPM requirements
        run: |
          rpm -qpR dist/gic-ipsec-client-*.rpm | tee rpm-requires.txt
          grep -F 'strongswan' rpm-requires.txt
          ! grep -F '/usr/sbin/swanctl' rpm-requires.txt
          ! grep -F '/usr/bin/swanctl' rpm-requires.txt
          ! grep -F 'strongswan-swanctl' rpm-requires.txt

      - name: Install Fedora runtime dependencies
        run: dnf -y install strongswan polkit libsecret

      - name: Install RPM in clean Fedora container
        run: dnf -y install ./dist/gic-ipsec-client-*-1.x86_64.rpm

      - name: Verify installed commands
        run: |
          command -v swanctl
          swanctl --version
          gic-ipsec-client --version
