name: Ubuntu DEB package

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y git golang python3 python3-pip python3-venv
          GOBIN="$HOME/go/bin" go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          "$HOME/go/bin/nfpm" --version

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build DEB
        run: bash ./packaging/build-packages.sh

      - name: Validate package version
        run: |
          bash ./scripts/validate-package-version.sh
          VERSION="$(cat VERSION)"
          PACKAGE_RELEASE="$(cat PACKAGE_RELEASE)"
          test -f "dist/gic-ipsec-client_${VERSION}-${PACKAGE_RELEASE}_amd64.deb"
          ! find dist -maxdepth 1 -type f -name '*0.1.0*' | grep -q .

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gic-ipsec-client-deb
          path: dist/gic-ipsec-client_*.deb
          if-no-files-found: error

  install-smoke:
    runs-on: ubuntu-latest
    needs: build-deb

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: gic-ipsec-client-deb
          path: dist

      - name: Validate DEB version metadata
        run: |
          VERSION="$(cat VERSION)"
          PACKAGE_RELEASE="$(cat PACKAGE_RELEASE)"
          deb_file="$(ls dist/gic-ipsec-client_${VERSION}-${PACKAGE_RELEASE}_*.deb)"
          test -n "$deb_file"
          test "$(dpkg-deb -f "$deb_file" Version)" = "${VERSION}-${PACKAGE_RELEASE}"
          ! find dist -maxdepth 1 -type f -name '*0.1.0*' | grep -q .

      - name: Inspect DEB dependencies
        run: |
          dpkg-deb -I dist/gic-ipsec-client_*.deb | grep Depends | tee deb-depends.txt
          grep -F 'strongswan-swanctl' deb-depends.txt
          grep -F 'libstrongswan-extra-plugins' deb-depends.txt
          grep -F 'libxcb-cursor0' deb-depends.txt
          grep -F 'libxkbcommon-x11-0' deb-depends.txt
          ! grep -E '(^|[[:space:],])swanctl([[:space:],(]|$)' deb-depends.txt

      - name: Install DEB in clean Ubuntu runner
        run: |
          sudo apt update
          sudo apt install -y ./dist/gic-ipsec-client_*.deb
          VERSION="$(cat VERSION)"
          test "$(gic-ipsec-client --version)" = "gic-ipsec-client ${VERSION}"
          test "$(/usr/libexec/gic-ipsec-client/gic-ipsec-helper --version)" = "gic-ipsec-helper ${VERSION}"
          command -v gic-ipsec-client
          test -x /usr/libexec/gic-ipsec-client/gic-ipsec-helper
          command -v swanctl
          dpkg -l | grep -E 'strongswan|swanctl|libxcb-cursor0|libxkbcommon-x11'
          systemctl list-unit-files | grep -Ei 'strongswan|charon' || true
