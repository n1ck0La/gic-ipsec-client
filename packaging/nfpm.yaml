name: gic-ipsec-client
arch: amd64
platform: linux
version: ${VERSION}
section: net
priority: optional
maintainer: GIC IPsec Client contributors
description: strongSwan-backed multi-site IKEv2 VPN client
vendor: GIC
homepage: https://example.invalid/gic-ipsec-client
license: MIT
contents:
  - src: ./build/package/app
    dst: /opt/gic-ipsec-client/app
  - src: ./build/package/venv
    dst: /opt/gic-ipsec-client/venv
  - src: ./packaging/bin/gic-ipsec-client
    dst: /usr/bin/gic-ipsec-client
    file_info:
      mode: 0755
  - src: ./packaging/libexec/gic-ipsec-helper
    dst: /usr/libexec/gic-ipsec-client/gic-ipsec-helper
    file_info:
      mode: 0755
  - src: ./packaging/gic-ipsec-client.desktop
    dst: /usr/share/applications/gic-ipsec-client.desktop
  - src: ./src/gic_ipsec_client/resources/app_icon.svg
    dst: /usr/share/icons/hicolor/scalable/apps/gic-ipsec-client.svg
  - src: ./packaging/polkit/com.gicipsec.client.policy
    dst: /usr/share/polkit-1/actions/com.gicipsec.client.policy
  - src: ./packaging/defaults.json
    dst: /etc/gic-ipsec-client/defaults.json
overrides:
  deb:
    depends:
      - strongswan
      - strongswan-swanctl
      - libcharon-extauth-plugins
      - libcharon-extra-plugins
      - python3
      - polkitd | policykit-1
      - libsecret-1-0
      - iproute2
      - systemd
  rpm:
    depends:
      - strongswan
      - polkit
      - libsecret
      - iproute
      - systemd-resolved
